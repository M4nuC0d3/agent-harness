# ===========================================================================
#  MODEL ROUTING  —  which model each agent role uses. THIS is the knob.
#
#  provider:  anthropic | openai | google | local | mock | <your own>
#  Swap provider/model per role freely; mix vendors in the same run.
#  Global override without touching this file:
#      AI_FORCE_MODEL="mock:mock"       -> dry run, no keys / no network
#      AI_FORCE_MODEL="anthropic:claude-haiku-4-5-20251001"  -> cheap everything
#
#  Current Anthropic model ids (verify latest at
#  https://docs.claude.com/en/docs/about-claude/models):
#      claude-opus-4-8              strongest reasoning / coordination
#      claude-sonnet-5              balanced / implementation
#      claude-haiku-4-5-20251001    fast / cheap / search
# ===========================================================================
models:
  default:
    provider: anthropic
    model: claude-sonnet-5
    temperature: 0.2
    max_tokens: 4096

  planner:            # coordination + judgment -> strongest model
    provider: anthropic
    model: claude-opus-4-8
    temperature: 0.1
    max_tokens: 2048

  worker:             # implementation -> balanced model
    provider: anthropic
    model: claude-sonnet-5
    temperature: 0.3
    max_tokens: 8192

  evaluator:          # critic -> strong model, deterministic
    provider: anthropic
    model: claude-opus-4-8
    temperature: 0.0
    max_tokens: 2048

  # --- Examples: route a role to a different vendor or a local model --------
  # researcher:
  #   provider: local
  #   model: llama3.1:70b          # served via Ollama at LOCAL_OPENAI_BASE_URL
  # summarizer:
  #   provider: openai
  #   model: gpt-4.1-mini          # example; use a current OpenAI model id
  # judge:
  #   provider: google
  #   model: gemini-2.5-pro        # example; use a current Gemini model id

# Hard limits — the run stops as soon as any of these is hit (guarantees
# termination; no agent combination can loop forever).
budget:
  max_tokens: 200000
  max_wall_seconds: 600
  max_iterations: 20
  max_revisions_per_task: 2

loop:
  pass_threshold: 0.7        # evaluator score needed to accept a subtask
  max_concurrency: 4         # how many workers run at once
  require_human_approval: false
  runs_dir: runs
