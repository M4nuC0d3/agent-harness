# ===========================================================================
#  MODEL ROUTING  —  which model each agent role uses. THIS is the knob.
#
#  provider:
#    API key path (billed per token):
#      anthropic | openai | google | local
#    Subscription path (drives the vendor agent CLI; uses your account login):
#      claude_cli | codex_cli | gemini_cli
#    Offline:
#      mock
#
#  Swap provider/model per role freely; mix vendors AND billing paths in the
#  same run. Global override without touching this file:
#      AI_FORCE_MODEL="mock:mock"       -> dry run, no keys / no network
#      AI_FORCE_MODEL="anthropic:claude-haiku-4-5-20251001"  -> cheap everything
#      AI_FORCE_MODEL="claude_cli:sonnet"                    -> everything on the plan
#
#  Current Anthropic model ids (verify latest at
#  https://docs.claude.com/en/docs/about-claude/models):
#      claude-opus-4-8              strongest reasoning / coordination
#      claude-sonnet-5              balanced / implementation
#      claude-haiku-4-5-20251001    fast / cheap / search
# ===========================================================================
models:
  default:
    provider: anthropic
    model: claude-sonnet-5
    temperature: 0.2
    max_tokens: 4096

  planner:            # coordination + judgment -> strongest model
    provider: anthropic
    model: claude-opus-4-8
    temperature: 0.1
    max_tokens: 2048

  worker:             # implementation -> balanced model
    provider: anthropic
    model: claude-sonnet-5
    temperature: 0.3
    max_tokens: 8192

  evaluator:          # critic -> strong model, deterministic
    provider: anthropic
    model: claude-opus-4-8
    temperature: 0.0
    max_tokens: 2048

  # --- Examples: route a role to a different vendor or a local model --------
  # researcher:
  #   provider: local
  #   model: llama3.1:70b          # served via Ollama at LOCAL_OPENAI_BASE_URL
  # summarizer:
  #   provider: openai
  #   model: gpt-4.1-mini          # example; use a current OpenAI model id
  # judge:
  #   provider: google
  #   model: gemini-2.5-pro        # example; use a current Gemini model id

  # --- SUBSCRIPTION PATH: shell out to the vendor agent CLI instead of the API
  # Usage draws on your plan (Claude / ChatGPT / Google account) rather than an
  # API key. Requires the CLI installed and logged in. Trade-offs: temperature
  # and max_tokens are ignored, token counts are ESTIMATES, one process per call.
  # Lower loop.max_concurrency to 1-2 — plan limits are sized for one human.
  # Use model: inherit to let the CLI decide.
  #
  # worker:
  #   provider: claude_cli         # `claude -p`
  #   model: sonnet                # opus | sonnet | haiku | full id | inherit
  # worker:
  #   provider: codex_cli          # `codex exec`
  #   model: inherit
  # worker:
  #   provider: gemini_cli         # `gemini -p`  (unset GEMINI_API_KEY first!)
  #   model: inherit

# Hard limits — the run stops as soon as any of these is hit (guarantees
# termination; no agent combination can loop forever).
budget:
  max_tokens: 200000
  max_wall_seconds: 600
  max_iterations: 20
  max_revisions_per_task: 2

# Sub-agent CONTEXT ISOLATION. Each worker starts with a clean, minimal context
# and returns a distilled summary that flows downstream (Anthropic's
# context-engineering pattern). Policy picks how tightly context is scoped:
#   full    -> full results of finished tasks (least isolation)
#   scoped  -> only summaries of THIS task's dependencies (recommended)
#   minimal -> just the one-line goal
#   none    -> nothing but the subtask itself (max isolation)
context:
  policy: scoped
  summary_target_tokens: 400     # size of each sub-agent's distilled summary
  max_context_tokens: 2000       # cap on the brief handed to a worker

# HUMAN-IN-THE-LOOP checkpoints. mode "auto" runs unattended; "interactive"
# asks on the terminal. CLI flags override: --interactive, --approve, --results.
hitl:
  mode: auto                     # auto | interactive
  plan: true                     # review the plan before any work starts
  results: on_fail               # off | on_fail | always  (review a subtask result)
  final: false                   # review the synthesized answer before accepting

loop:
  pass_threshold: 0.7            # evaluator score needed to accept a subtask
  max_concurrency: 4             # how many workers run at once
  runs_dir: runs
